<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geduma Auth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    .container { text-align: center; }
    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0.6;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      font-size: 0.9rem;
      opacity: 0.5;
    }
    .error {
      margin-top: 1rem;
      padding: 0.75rem 1.25rem;
      background: rgba(211, 47, 47, 0.15);
      border: 1px solid rgba(211, 47, 47, 0.3);
      border-radius: 8px;
      color: #ef5350;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Geduma Auth</h1>
    <div class="spinner" id="spinner"></div>
    <p id="status">Processing login...</p>
    <div id="error" class="error"></div>
  </div>
  <script>
    ;(function () {
      var redirectUrl = '{{REDIRECT_URL}}'
      var sessionToken = '{{SESSION_TOKEN}}'
      var errorMsg = '{{ERROR}}'

      if (errorMsg && errorMsg.indexOf('{{') !== 0) {
        document.getElementById('spinner').style.display = 'none'
        document.getElementById('status').textContent = 'Login failed'
        document.getElementById('error').style.display = 'block'
        document.getElementById('error').textContent = errorMsg
      } else if (redirectUrl && redirectUrl.indexOf('{{') !== 0 && sessionToken && sessionToken.indexOf('{{') !== 0) {
        setTimeout(function () {
          window.location.href = redirectUrl + '?session_token=' + sessionToken
        }, 600)
      } else {
        document.getElementById('spinner').style.display = 'none'
        document.getElementById('status').textContent = 'Welcome to Geduma Auth'
      }
    })()
  </script>
</body>
</html>
