<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
  h1 { font-size: 24px; margin-bottom: 4px; color: #58a6ff; }
  h1 span { display: inline-block; background: #1f3a5f; color: #58a6ff; font-size: 13px; font-weight: 600; padding: 2px 8px; border-radius: 6px; vertical-align: middle; margin-left: 4px; letter-spacing: .3px; }
  .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 20px; }
  .last-update { color: #8b949e; font-size: 12px; margin-bottom: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
  .stat-card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .stat-card .value.green { color: #3fb950; }
  .stat-card .value.yellow { color: #d29922; }
  .stat-card .value.red { color: #f85149; }
  table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
  th { text-align: left; padding: 12px 16px; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; background: #0d1117; border-bottom: 1px solid #30363d; }
  td { padding: 12px 16px; border-bottom: 1px solid #21262d; font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
  .status-dot.green { background: #3fb950; }
  .status-dot.yellow { background: #d29922; }
  .status-dot.red { background: #f85149; }
  .alerts-section { margin-top: 24px; }
  .alerts-section h2 { font-size: 16px; margin-bottom: 12px; color: #f85149; }
  .alerts-scroll { max-height: 360px; overflow-y: auto; }
  .alert-card { background: #161b22; border: 1px solid #f85149; border-left: 4px solid #f85149; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
  .alert-card.warn { border-color: #d29922; border-left-color: #d29922; }
  .alert-card .alert-title { font-weight: 600; font-size: 14px; }
  .alert-card .alert-msg { color: #8b949e; font-size: 13px; margin-top: 2px; }
  .alert-card .alert-severity { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-top: 4px; }
  .alert-card .alert-severity.ALERT { background: #f8514933; color: #f85149; }
  .alert-card .alert-severity.WARN { background: #d2992233; color: #d29922; }
  .errors-section { margin-top: 24px; }
  .errors-section h2 { font-size: 16px; margin-bottom: 12px; color: #d29922; }
  .error-row { background: #161b22; padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; font-size: 13px; font-family: monospace; border-left: 3px solid #30363d; }
  .error-row.err { border-left-color: #f85149; }
  .error-row.warn { border-left-color: #d29922; }
  .error-row .meta { color: #8b949e; font-size: 11px; }
  .error-row .path { color: #58a6ff; }
  .error-row .code { font-weight: 600; padding: 1px 6px; border-radius: 3px; }
  .error-row .code.four { color: #d29922; }
  .error-row .code.five { color: #f85149; }
  .pagination { display: flex; align-items: center; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .pagination .info { color: #8b949e; font-size: 12px; margin-right: auto; }
  .pagination button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .pagination #pageNumbers { display: inline-flex; gap: 3px; }
  .pagination button:hover:not(:disabled) { border-color: #58a6ff; }
  .pagination button:disabled { opacity: .4; cursor: default; }
  .pagination button.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; flex-wrap: wrap; gap: 8px; }
  .header-row .last-update { margin-bottom: 0; font-size: 12px; color: #8b949e; }
  .header-controls { display: flex; align-items: center; gap: 12px; }
  .countdown { font-size: 13px; color: #8b949e; font-variant-numeric: tabular-nums; min-width: 24px; }
  .btn-refresh { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; line-height: 1.4; transition: background .15s, border-color .15s; }
  .btn-refresh:hover { background: #30363d; border-color: #58a6ff; }
  .btn-refresh:disabled { opacity: .6; cursor: wait; }
  .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
  .btn-spinner.visible { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(13,17,23,.4); display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .refresh-overlay.visible { display: flex; }
  .refresh-overlay .loading-spinner { width: 32px; height: 32px; border-width: 3px; }
  .loading-overlay { text-align: center; padding: 60px 20px; color: #8b949e; }
  .loading-spinner { width: 24px; height: 24px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background .15s, border-color .15s, color .15s; }
  .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .filter-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }
  .tabs { display: flex; gap: 0; margin-bottom: 12px; }
  .tab-btn { background: #161b22; border: 1px solid #30363d; color: #8b949e; padding: 6px 16px; cursor: pointer; font-size: 13px; transition: background .15s, border-color .15s, color .15s; position: relative; z-index: 0; }
  .tab-btn:first-child { border-radius: 6px 0 0 6px; }
  .tab-btn:last-child { border-radius: 0 6px 6px 0; }
  .tab-btn + .tab-btn { margin-left: -1px; }
  .tab-btn:hover { border-color: #58a6ff; color: #c9d1d9; z-index: 2; }
  .tab-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; z-index: 2; }
  .page-size-select { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 3px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table-wrap table { min-width: 600px; }
  @media (max-width: 640px) {
    body { padding: 12px; }
    h1 { font-size: 20px; }
    .grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-card .value { font-size: 22px; }
    th, td { padding: 8px 10px; font-size: 12px; }
    .alert-card { padding: 10px 12px; }
    .alert-card .alert-title { font-size: 13px; }
    .alert-card .alert-msg { font-size: 12px; }
    .header-row { flex-direction: column; align-items: flex-start; }
    .header-controls { width: 100%; justify-content: space-between; }
    .tabs { flex-wrap: wrap; }
    .tab-btn { flex: 1; text-align: center; padding: 6px 8px; font-size: 12px; }
    .filter-group { gap: 3px; }
    .filter-btn { padding: 2px 7px; font-size: 11px; }
    .pagination { flex-direction: row; justify-content: center; gap: 4px; }
    .pagination .info { margin-right: 0; width: 100%; text-align: center; order: -1; margin-bottom: 2px; }
    .pagination #pageNumbers { flex-wrap: wrap; justify-content: center; }
    .pagination .page-btn { padding: 4px 7px; min-width: 28px; text-align: center; font-size: 12px; }
    .error-row { font-size: 12px; padding: 6px 10px; word-break: break-all; }
    .error-row .path { word-break: break-all; }
  }
</style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div>Loading dashboard...</div>
  </div>

  <div id="dashboardContent" style="display:none">
  <div class="header-row">
    <div><h1>Geduma <span>api-admin</span></h1><div class="subtitle">Monitoring dashboard</div></div>
    <div class="header-controls">
      <span class="countdown" id="countdown">15s</span>
      <button class="btn-refresh" id="btnRefresh" onclick="manualRefresh()"><span class="btn-spinner" id="refreshSpinner"></span>↻ Refresh</button>
    </div>
  </div>
  <div class="last-update" id="lastUpdate">Loading...</div>

  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
    <label style="color:#8b949e;font-size:12px;">Window:</label>
    <select class="page-size-select" id="windowSelect">
      <option value="5">5 min</option>
      <option value="15">15 min</option>
      <option value="60">1 hour</option>
      <option value="1440">24 hours</option>
      <option value="0">All time</option>
    </select>
  </div>
  <div class="grid" id="globalStats">
    <div class="stat-card"><div class="label" id="labelReqs">Total Requests</div><div class="value" id="totalReqs">-</div></div>
    <div class="stat-card"><div class="label" id="labelErrors">Errors</div><div class="value" id="totalErrors">-</div></div>
    <div class="stat-card"><div class="label" id="labelErrRate">Error Rate</div><div class="value" id="errorRate">-</div></div>
    <div class="stat-card"><div class="label" id="labelAvgTime">Avg Response Time</div><div class="value" id="avgTime">-</div></div>
  </div>

  <div id="alertsContainer" class="alerts-section"></div>

  <div class="table-wrap">
  <table id="modulesTable">
    <thead><tr><th>Module</th><th>Status</th><th id="thReqs">Requests</th><th>Errors</th><th>4xx</th><th>Avg RT (ms)</th><th>Slow</th></tr></thead>
    <tbody id="modulesBody"></tbody>
  </table>
  </div>

  <div id="errorsContainer" class="errors-section">
    <div class="tabs">
      <button class="tab-btn active" data-tab="errors">Errors</button>
      <button class="tab-btn" data-tab="all">All Log</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div class="filter-group" id="errorFilters">
        <button class="filter-btn active" data-code="">All</button>
        <button class="filter-btn" data-code="4xx">4xx</button>
        <button class="filter-btn" data-code="5xx">5xx</button>
        <button class="filter-btn" data-code="401">401</button>
        <button class="filter-btn" data-code="403">403</button>
        <button class="filter-btn" data-code="404">404</button>
        <button class="filter-btn" data-code="429">429</button>
        <button class="filter-btn" data-code="500">500</button>
      </div>
      <div>
        <label style="color:#8b949e;font-size:12px;margin-right:4px;">Per page:</label>
        <select class="page-size-select" id="pageSizeSelect">
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
    </div>
    <div id="errorsList">No errors</div>
    <div class="pagination" id="errorsPagination" style="display:none">
      <span class="info" id="paginationInfo"></span>
      <button class="page-btn" data-page="prev" disabled>‹ Prev</button>
      <span id="pageNumbers"></span>
      <button class="page-btn" data-page="next" disabled>Next ›</button>
    </div>
  </div>
  </div>

  <div class="refresh-overlay" id="refreshOverlay">
    <div class="loading-spinner"></div>
  </div>

<script>
const ADMIN_EMAIL = '{{ADMIN_EMAIL}}'
const headers = { 'x-admin-email': ADMIN_EMAIL }

let firstLoad = true
let errorCodeFilter = ''
let currentPage = 1
let activeTab = 'errors'
let pageSize = 10
let statWindow = 5

function windowSuffix (min) {
  let s
  if (min <= 0) s = '(all)'
  else if (min < 60) s = min + 'min'
  else if (min < 1440) s = (min / 60) + 'h'
  else s = '24h'
  return ' <span style="text-transform:none;font-weight:400">' + s + '</span>'
}

function renderPagination ({ page, totalPages, total }) {
  const pag = document.getElementById('errorsPagination')
  const info = document.getElementById('paginationInfo')
  const nums = document.getElementById('pageNumbers')

  if (total === 0) { pag.style.display = 'none'; return }

  pag.style.display = 'flex'
  info.textContent = totalPages > 1 ? page + ' of ' + totalPages + ' (' + total + ' total)' : total + ' results'

  if (totalPages > 1) {
    let html = ''
    const start = Math.max(1, page - 2)
    const end = Math.min(totalPages, page + 2)
    if (start > 1) html += '<button class="page-btn" data-page="1">1</button>' + (start > 2 ? '<span style="color:#8b949e;padding:0 4px">…</span>' : '')
    for (let i = start; i <= end; i++) {
      html += '<button class="page-btn' + (i === page ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>'
    }
    if (end < totalPages) html += (end < totalPages - 1 ? '<span style="color:#8b949e;padding:0 4px">…</span>' : '') + '<button class="page-btn" data-page="' + totalPages + '">' + totalPages + '</button>'
    nums.innerHTML = html
  } else {
    nums.innerHTML = ''
  }

  pag.querySelector('[data-page="prev"]').disabled = page <= 1
  pag.querySelector('[data-page="next"]').disabled = page >= totalPages
}

function renderErrors (errors) {
  const el = document.getElementById('errorsList')
  if (errors.length === 0) {
    el.innerHTML = '<div class="error-row" style="color:#8b949e;">No entries</div>'
    return
  }
  let html = ''
  for (const e of errors) {
    const codeClass = e.statusCode >= 500 ? 'five' : e.statusCode >= 400 ? 'four' : ''
    const rowClass = e.statusCode >= 500 ? ' err' : e.statusCode >= 400 ? ' warn' : ''
    const time = new Date(e.timestamp).toLocaleTimeString()
    html += '<div class="error-row' + rowClass + '">'
    html += '<span class="code ' + codeClass + '">' + e.statusCode + '</span> '
    html += '<span class="path">' + e.method + ' ' + e.path + '</span>'
    html += '<div class="meta">' + e.module + ' · ' + e.responseTime + 'ms · ' + e.ip + ' · ' + time + '</div>'
    html += '</div>'
  }
  el.innerHTML = html
}

async function loadData () {
  try {
    const errorsUrl = '/admin/api/errors?limit=' + pageSize + '&page=' + currentPage + '&tab=' + activeTab + (errorCodeFilter ? '&code=' + errorCodeFilter : '')
    const [summaryRes, alertsRes, errorsRes] = await Promise.all([
      fetch('/admin/api/summary?window=' + statWindow, { headers }),
      fetch('/admin/api/alerts', { headers }),
      fetch(errorsUrl, { headers })
    ])
    const summary = await summaryRes.json()
    const alertsData = alertsRes.ok ? (await alertsRes.json()).data : []
    const errorsResData = errorsRes.ok ? (await errorsRes.json()).data : {}
    const errorsData = errorsResData.items || []
    const errorsMeta = { page: errorsResData.page || currentPage, totalPages: errorsResData.totalPages || 0, total: errorsResData.total || 0 }

    if (firstLoad) {
      document.getElementById('loadingOverlay').style.display = 'none'
      document.getElementById('dashboardContent').style.display = 'block'
      firstLoad = false
    }

    document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString()

    const suffix = windowSuffix(statWindow)
    document.getElementById('labelReqs').innerHTML = 'Total Requests' + suffix
    document.getElementById('labelErrors').innerHTML = 'Errors' + suffix
    document.getElementById('labelErrRate').innerHTML = 'Error Rate' + suffix
    document.getElementById('labelAvgTime').innerHTML = 'Avg Response Time' + suffix
    document.getElementById('thReqs').innerHTML = 'Requests' + suffix

    const modules = Array.isArray(summary) ? summary : (summary.data || [])
    const totalReqs = modules.reduce((a, m) => a + m.totalRequests, 0)
    const totalErrors = modules.reduce((a, m) => a + m.errors, 0)

    document.getElementById('totalReqs').textContent = totalReqs
    document.getElementById('totalErrors').textContent = totalErrors

    const errRate = totalReqs > 0 ? ((totalErrors / totalReqs) * 100).toFixed(1) + '%' : '0%'
    document.getElementById('errorRate').textContent = errRate
    document.getElementById('errorRate').className = 'value' + (totalErrors > 0 ? ' red' : '')

    const allTimes = modules.filter(m => m.avgResponseTime > 0)
    const avgTime = allTimes.length > 0 ? Math.round(allTimes.reduce((a, m) => a + m.avgResponseTime, 0) / allTimes.length) : 0
    document.getElementById('avgTime').textContent = avgTime + 'ms'
    document.getElementById('avgTime').className = 'value' + (avgTime > 1000 ? ' red' : avgTime > 500 ? ' yellow' : ' green')

    const tbody = document.getElementById('modulesBody')
    tbody.innerHTML = ''
    if (modules.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8b949e;">No data yet</td></tr>'
    } else {
      for (const mod of modules) {
        const errPct = mod.totalRequests > 0 ? (mod.errors / mod.totalRequests) * 100 : 0
        const status = errPct >= 10 || mod.avgResponseTime > 2000 ? 'red' : errPct >= 5 || mod.avgResponseTime > 1000 ? 'yellow' : 'green'
        tbody.innerHTML += '<tr><td><strong>' + mod.module + '</strong></td><td><span class="status-dot ' + status + '"></span></td><td>' + mod.totalRequests + '</td><td>' + mod.errors + '</td><td>' + mod.clientErrors + '</td><td>' + mod.avgResponseTime + '</td><td>' + mod.slowCount + '</td></tr>'
      }
    }

    const alertsEl = document.getElementById('alertsContainer')
    if (alertsData.length > 0) {
      let html = '<h2>Active Alerts</h2><div class="alerts-scroll">'
      for (const a of alertsData) {
        html += '<div class="alert-card ' + (a.severity === 'WARN' ? 'warn' : '') + '">'
        html += '<div class="alert-title">' + a.module + ' — ' + a.type + '</div>'
        html += '<div class="alert-msg">' + a.message + '</div>'
        html += '<span class="alert-severity ' + a.severity + '">' + a.severity + '</span>'
        html += '</div>'
      }
      html += '</div>'
      alertsEl.innerHTML = html
    } else {
      alertsEl.innerHTML = ''
    }

    renderErrors(errorsData)
    renderPagination(errorsMeta)
  } catch (e) {
    console.error('Failed to load dashboard data:', e)
  }
}

const REFRESH_INTERVAL = 15
let countdown = REFRESH_INTERVAL
let countdownTimer = null

function resetCountdown () {
  countdown = REFRESH_INTERVAL
  document.getElementById('countdown').textContent = countdown + 's'
}

function tick () {
  countdown--
  document.getElementById('countdown').textContent = countdown + 's'
  if (countdown <= 0) {
    resetCountdown()
    document.getElementById('refreshOverlay').classList.add('visible')
    loadData().then(() => {
      document.getElementById('refreshOverlay').classList.remove('visible')
    })
  }
}

async function manualRefresh () {
  const btn = document.getElementById('btnRefresh')
  const spinner = document.getElementById('refreshSpinner')
  const overlay = document.getElementById('refreshOverlay')
  btn.disabled = true
  spinner.classList.add('visible')
  overlay.classList.add('visible')
  resetCountdown()
  await loadData()
  overlay.classList.remove('visible')
  spinner.classList.remove('visible')
  btn.disabled = false
}

document.querySelector('.tabs').addEventListener('click', function (e) {
  const btn = e.target.closest('.tab-btn')
  if (!btn) return
  this.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  activeTab = btn.dataset.tab
  currentPage = 1
  loadData()
})

document.getElementById('windowSelect').addEventListener('change', function () {
  statWindow = Number(this.value)
  loadData()
})

document.getElementById('pageSizeSelect').addEventListener('change', function () {
  pageSize = Number(this.value)
  currentPage = 1
  loadData()
})

document.getElementById('errorFilters').addEventListener('click', function (e) {
  const btn = e.target.closest('.filter-btn')
  if (!btn) return
  this.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  errorCodeFilter = btn.dataset.code
  currentPage = 1
  loadData()
})

document.getElementById('errorsPagination').addEventListener('click', function (e) {
  const btn = e.target.closest('.page-btn')
  if (!btn || btn.disabled) return
  const page = btn.dataset.page
  if (page === 'prev') currentPage--
  else if (page === 'next') currentPage++
  else currentPage = Number(page)
  loadData()
})

resetCountdown()
countdownTimer = setInterval(tick, 1000)
loadData()
</script>
</body>
</html>
